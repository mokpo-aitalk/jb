<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 습관이 장점이 되다</title>
<script>
// 카카오톡 인앱 브라우저 감지 → 외부 브라우저로 자동 이동
(function(){
  var ua = navigator.userAgent || '';
  if(ua.match(/KAKAOTALK/i)){
    // Android: intent로 외부 브라우저 열기
    if(ua.match(/Android/i)){
      location.href = 'intent://' + location.href.replace(/https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
      return;
    }
    // iOS 또는 redirect 실패: 안내 화면 표시
    setTimeout(function(){
      var guide = document.getElementById('kakao-guide');
      if(guide) guide.style.display = 'flex';
    }, 300);
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --peach:#FFB5A7;--mint:#B8E8D0;--sky:#A8D8EA;--lemon:#FFF3B0;
  --lavender:#D5C6E0;--coral:#FF8A80;--cream:#FFF9F0;--white:#FFFFFF;
  --text:#4A4A4A;--text-light:#888;--shadow:0 4px 20px rgba(0,0,0,0.06);
}
html,body{width:100%;min-height:100vh;min-height:100dvh;overflow-x:hidden;overflow-y:auto;
  font-family:'Noto Sans KR','Gaegu',sans-serif;color:var(--text);
  background:var(--cream);-webkit-overflow-scrolling:touch;}
.bg-deco{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-deco::before{content:'';position:absolute;top:-20%;right:-20%;width:60vw;height:60vw;
  background:radial-gradient(circle,rgba(255,181,167,0.3),transparent 70%);border-radius:50%}
.bg-deco::after{content:'';position:absolute;bottom:-10%;left:-15%;width:50vw;height:50vw;
  background:radial-gradient(circle,rgba(184,232,208,0.35),transparent 70%);border-radius:50%}
.cloud{position:absolute;background:white;border-radius:50%;opacity:0.4;animation:floatCloud linear infinite}
.cloud.c1{width:120px;height:40px;top:8%;left:-120px;animation-duration:25s}
.cloud.c2{width:90px;height:30px;top:22%;left:-90px;animation-duration:35s;animation-delay:8s}
.cloud.c3{width:100px;height:35px;top:50%;left:-100px;animation-duration:30s;animation-delay:15s}
@keyframes floatCloud{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 200px))}}
.shape{position:absolute;border-radius:50%;opacity:0.15;animation:floatShape 6s ease-in-out infinite}
.shape.s1{width:20px;height:20px;background:var(--peach);top:15%;right:10%}
.shape.s2{width:14px;height:14px;background:var(--mint);top:40%;left:8%;animation-delay:1.5s}
.shape.s3{width:18px;height:18px;background:var(--sky);top:70%;right:15%;animation-delay:3s}
.shape.s4{width:12px;height:12px;background:var(--lemon);top:85%;left:20%;animation-delay:2s}
.shape.s5{width:16px;height:16px;background:var(--lavender);top:30%;left:25%;animation-delay:4s}
@keyframes floatShape{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(180deg)}}
.screen{display:none;flex-direction:column;align-items:center;
  min-height:100vh;min-height:100dvh;padding:24px 16px 40px;position:relative;z-index:1;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}
/* INTRO */
#intro-screen{justify-content:center;text-align:center;gap:20px}
.intro-emoji{font-size:56px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.game-title{font-family:'Black Han Sans';font-size:clamp(26px,6.5vw,36px);color:var(--text);line-height:1.4}
.game-title em{font-style:normal;background:linear-gradient(135deg,var(--coral),#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.intro-sub{font-size:14px;color:var(--text-light);line-height:1.7;font-family:'Gaegu';font-weight:700;max-width:300px}
.main-btn{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;border:none;border-radius:60px;
  background:linear-gradient(135deg,var(--peach),var(--coral));color:#fff;font-family:'Black Han Sans';font-size:17px;
  cursor:pointer;box-shadow:0 6px 24px rgba(255,138,128,0.35);transition:transform 0.2s}
.main-btn:active{transform:scale(0.96)}
/* UPLOAD */
#upload-screen{justify-content:center;gap:20px;text-align:center}
.upload-title{font-family:'Black Han Sans';font-size:20px}
.upload-title em{font-style:normal;color:var(--coral)}
.upload-box{width:100%;max-width:320px;background:var(--white);border:3px dashed var(--peach);border-radius:24px;
  padding:32px 20px;cursor:pointer;transition:all 0.3s;position:relative}
.upload-box:active{border-color:var(--coral)}
.upload-box input{display:none}
.upload-preview{width:100px;height:100px;border-radius:24px;object-fit:cover;border:4px solid var(--peach);display:none;margin:0 auto 12px}
.upload-icon{font-size:48px;margin-bottom:8px;display:block}
.upload-hint{font-size:13px;color:var(--text-light);line-height:1.6}
.upload-hint strong{color:var(--coral)}
.upload-required{font-size:11px;color:var(--coral);margin-top:8px;font-weight:700}
.persona-detect{display:none;align-items:center;gap:8px;justify-content:center;margin-top:12px;padding:10px 16px;border-radius:16px;
  background:linear-gradient(135deg,rgba(255,181,167,0.15),rgba(184,232,208,0.15));font-size:14px;font-weight:700}
.persona-detect.show{display:inline-flex}
.p-sel-btn{padding:8px 14px;border:2px solid rgba(0,0,0,0.08);border-radius:12px;background:var(--white);font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;color:var(--text)}
.p-sel-btn:active{transform:scale(0.95)}
.p-sel-btn.selected{border-color:var(--coral)!important;background:rgba(255,181,167,0.15)!important}
.go-btn{padding:16px 48px;border:none;border-radius:60px;background:linear-gradient(135deg,#ccc,#bbb);
  color:#fff;font-family:'Black Han Sans';font-size:17px;cursor:default;opacity:0.5;transition:all 0.4s}
.go-btn.ready{background:linear-gradient(135deg,var(--peach),var(--coral));opacity:1;cursor:pointer;box-shadow:0 6px 24px rgba(255,138,128,0.35)}
.go-btn.ready:active{transform:scale(0.96)}
/* QUEST */
#quest-screen{padding-top:16px;gap:0}
.top-bar{width:100%;max-width:400px;display:flex;align-items:center;gap:12px;margin-bottom:12px}
.player-thumb{width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid var(--peach);background:var(--white)}
.stage-info{flex:1}
.stage-label{font-size:12px;color:var(--coral);font-weight:900;font-family:'Black Han Sans'}
.quest-counter{font-size:11px;color:var(--text-light);margin-top:2px}
.progress-track{width:100%;max-width:400px;height:8px;background:rgba(0,0,0,0.06);border-radius:8px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width 0.6s ease;background:linear-gradient(90deg,var(--mint),var(--sky),var(--peach))}
.quest-card{width:100%;max-width:400px;animation:cardIn 0.45s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.quest-scenario-box{background:var(--white);border-radius:24px;padding:24px 20px;box-shadow:var(--shadow);margin-bottom:20px;text-align:center}
.quest-num{font-size:11px;color:var(--coral);font-weight:900;margin-bottom:10px;font-family:'Black Han Sans';letter-spacing:1px}
.quest-scenario{font-size:14px;line-height:1.8;color:var(--text);word-break:keep-all}
.vs-container{display:flex;gap:12px;width:100%;max-width:400px;position:relative}
.vs-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--lemon),#FFD700);display:flex;align-items:center;justify-content:center;
  font-family:'Black Han Sans';font-size:12px;color:#866B00;box-shadow:0 2px 12px rgba(255,215,0,0.4)}
.vs-card{flex:1;background:var(--white);border-radius:20px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.25s;
  box-shadow:var(--shadow);border:3px solid transparent;display:flex;flex-direction:column;align-items:center;gap:8px;min-height:160px;justify-content:center}
.vs-card:active{transform:scale(0.96)}
.vs-card.left-card:active,.vs-card.left-card.chosen{border-color:var(--coral);background:rgba(255,181,167,0.08)}
.vs-card.right-card:active,.vs-card.right-card.chosen{border-color:var(--sky);background:rgba(168,216,234,0.08)}
.vs-skill{font-family:'Black Han Sans';font-size:14px;padding:6px 12px;border-radius:12px}
.left-card .vs-skill{background:rgba(255,181,167,0.2);color:#D4574E}
.right-card .vs-skill{background:rgba(168,216,234,0.25);color:#3D8DAE}
.vs-desc{font-size:12px;line-height:1.6;color:var(--text-light);word-break:keep-all}
.vs-card.chosen{pointer-events:none}
.vs-card.not-chosen{opacity:0.4;pointer-events:none}
@keyframes chosenPop{0%{box-shadow:0 0 0 0 rgba(255,138,128,0.4)}100%{box-shadow:0 0 0 15px rgba(255,138,128,0)}}
.vs-card.chosen{animation:chosenPop 0.5s ease}
/* BRIEFING */
.briefing-overlay{position:fixed;inset:0;z-index:100;background:rgba(255,249,240,0.92);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;padding:20px}
.briefing-overlay.show{display:flex}
.briefing-box{width:100%;max-width:360px;background:var(--white);border-radius:28px;padding:32px 24px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.1);animation:briefIn 0.5s ease}
@keyframes briefIn{from{opacity:0;transform:scale(0.9) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
.briefing-badge{display:inline-block;padding:6px 18px;border-radius:20px;font-family:'Black Han Sans';font-size:12px;
  background:linear-gradient(135deg,var(--mint),var(--sky));color:#3D6B5E;margin-bottom:12px}
.char-animation{width:160px;height:160px;margin:16px auto;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,181,167,0.2),rgba(184,232,208,0.2));
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.char-animation .char-img{width:100px;height:100px;object-fit:cover;border-radius:50%;animation:charEquip 1.5s ease infinite}
@keyframes charEquip{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.1) rotate(-5deg)}50%{transform:scale(1.05) rotate(5deg)}75%{transform:scale(1.1) rotate(-3deg)}}
.equip-orbit{position:absolute;width:100%;height:100%;animation:orbitSpin 3s linear infinite}
@keyframes orbitSpin{to{transform:rotate(360deg)}}
.equip-icon{position:absolute;font-size:28px;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.15))}
.equip-icon.ei-top{top:4px;left:50%;transform:translateX(-50%)}
.equip-icon.ei-right{top:50%;right:4px;transform:translateY(-50%)}
.equip-icon.ei-bottom{bottom:4px;left:50%;transform:translateX(-50%)}
.equip-icon.ei-left{top:50%;left:4px;transform:translateY(-50%)}
.sparkle{position:absolute;font-size:16px;animation:sparkle 1s ease infinite}
.sparkle.sp1{top:10%;left:15%}.sparkle.sp2{top:20%;right:12%;animation-delay:0.3s}
.sparkle.sp3{bottom:15%;left:20%;animation-delay:0.6s}.sparkle.sp4{bottom:10%;right:18%;animation-delay:0.2s}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1.2)}}
.briefing-equip-name{font-family:'Black Han Sans';font-size:20px;color:var(--text);margin:8px 0}
.briefing-equip-slot{font-size:12px;color:var(--text-light);margin-bottom:12px}
.briefing-text{font-size:13px;line-height:1.8;color:var(--text);background:rgba(255,181,167,0.08);border-radius:16px;padding:16px;
  margin:12px 0;word-break:keep-all;text-align:left}
.briefing-dismiss{padding:14px 36px;border:none;border-radius:40px;background:linear-gradient(135deg,var(--peach),var(--coral));
  color:#fff;font-family:'Black Han Sans';font-size:15px;cursor:pointer;transition:all 0.2s}
.briefing-dismiss:active{transform:scale(0.96)}
/* RESULT */
#result-screen{padding-top:24px;gap:16px;padding-bottom:60px}
#resume-screen{padding-top:24px;gap:16px;padding-bottom:60px}
.final-char-wrap{width:200px;height:200px;margin:0 auto;position:relative}
.final-char-bg{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(var(--peach),var(--mint),var(--sky),var(--lemon),var(--lavender),var(--peach));
  animation:auraRotate 6s linear infinite;opacity:0.3}
@keyframes auraRotate{to{transform:rotate(360deg)}}
.final-char-inner{position:absolute;inset:8px;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;overflow:hidden}
.final-char-img{width:120px;height:120px;object-fit:cover;border-radius:50%;animation:finalSpin 4s ease-in-out infinite}
@keyframes finalSpin{0%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.08) rotate(8deg)}50%{transform:scale(1) rotate(0deg)}75%{transform:scale(1.08) rotate(-8deg)}100%{transform:scale(1) rotate(0deg)}}
.final-equips{position:absolute;inset:-10px;animation:orbitSpin 5s linear infinite}
.final-equip-icon{position:absolute;font-size:24px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.15))}
.fei-1{top:0;left:50%;transform:translateX(-50%)}.fei-2{top:20%;right:0}.fei-3{bottom:20%;right:0}
.fei-4{bottom:0;left:50%;transform:translateX(-50%)}.fei-5{bottom:20%;left:0}.fei-6{top:20%;left:0}
.final-sparkles{position:absolute;inset:-20px;pointer-events:none}
.fsp{position:absolute;animation:sparkle 1.2s ease infinite}
.fsp1{top:0;left:30%;font-size:18px}.fsp2{top:10%;right:10%;font-size:14px;animation-delay:0.4s}
.fsp3{bottom:5%;left:15%;font-size:16px;animation-delay:0.8s}.fsp4{bottom:15%;right:15%;font-size:12px;animation-delay:0.2s}
.fsp5{top:40%;left:0;font-size:14px;animation-delay:0.6s}.fsp6{top:35%;right:0;font-size:16px;animation-delay:1s}
.result-card{width:100%;max-width:380px;background:var(--white);border-radius:28px;padding:28px 22px;text-align:center;
  box-shadow:0 8px 40px rgba(0,0,0,0.08);animation:resultIn 0.8s ease}
@keyframes resultIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:11px;color:var(--coral);font-weight:900;letter-spacing:2px;margin-bottom:8px}
.result-title{font-family:'Black Han Sans';font-size:22px;color:var(--text);line-height:1.4;margin-bottom:4px}
.result-sub{font-size:12px;color:var(--text-light);margin-bottom:20px}
.result-set{font-family:'Black Han Sans';font-size:16px;padding:10px 20px;border-radius:16px;display:inline-block;
  background:linear-gradient(135deg,rgba(255,181,167,0.15),rgba(184,232,208,0.15));color:var(--text);margin-bottom:6px}
.result-set-desc{font-size:11px;color:var(--text-light);margin-bottom:20px}
.inventory-grid{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:28px;padding-bottom:8px}
.inv-slot{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,rgba(255,181,167,0.1),rgba(184,232,208,0.1));
  border:2px solid rgba(0,0,0,0.04);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative}
.inv-label{position:absolute;bottom:-16px;font-size:8px;color:var(--text-light);white-space:nowrap;text-align:center;width:max-content;left:50%;transform:translateX(-50%)}
.radar-wrap{width:260px;margin:0 auto 16px}
.radar-wrap canvas{width:100%!important;height:auto!important}
.strength-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.str-badge{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,rgba(255,181,167,0.2),rgba(168,216,234,0.15));
  border:1.5px solid rgba(255,181,167,0.3);color:#D4574E}
.career-box{width:100%;max-width:380px;background:var(--white);border-radius:20px;padding:20px;text-align:left;box-shadow:var(--shadow)}
.career-box h4{font-family:'Black Han Sans';font-size:14px;color:var(--coral);margin-bottom:8px}
.career-box p{font-size:12px;line-height:1.8;color:var(--text);word-break:keep-all}
/* MAGIC CARDS - all open */
.magic-cards-section{width:100%;max-width:380px;margin-top:8px}
.magic-cards-title{font-family:'Black Han Sans';font-size:16px;text-align:center;margin-bottom:16px;color:var(--text)}
.magic-cards-title em{font-style:normal;color:var(--coral)}
.wizard-video-wrap{width:140px;height:140px;margin:0 auto 12px;border-radius:50%;overflow:hidden;
  box-shadow:0 4px 20px rgba(255,138,128,0.2);border:3px solid rgba(255,181,167,0.4)}
.wizard-video-wrap video{width:100%;height:100%;object-fit:cover}
.magic-card-container{perspective:800px;margin-bottom:16px}
.magic-card{width:100%;border-radius:20px;position:relative;transition:transform 0.8s;transform-style:preserve-3d;cursor:pointer;min-height:220px}
.magic-card.flipped{transform:rotateY(180deg)}
.magic-card-front,.magic-card-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;padding:28px 20px}
.magic-card-front{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:6px;
  background:linear-gradient(160deg,#fff,rgba(255,181,167,0.08));border:2px solid rgba(255,181,167,0.3)}
.card-rank{font-size:12px;font-weight:900;letter-spacing:2px;margin-bottom:2px;padding-top:4px;color:var(--coral)}
.card-trait-name{font-family:'Black Han Sans';font-size:22px;color:var(--text)}
.card-tap-hint{font-size:11px;margin-top:8px;color:var(--text-light)}
.magic-card-back{transform:rotateY(180deg);background:var(--white);border:2px solid rgba(255,181,167,0.3);overflow-y:auto;-webkit-overflow-scrolling:touch}
.card-back-header{text-align:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(0,0,0,0.06)}
.card-back-rank{font-size:10px;color:var(--coral);font-weight:900;letter-spacing:2px}
.card-back-trait{font-family:'Black Han Sans';font-size:18px;color:var(--text);margin-top:4px}
.guide-section{margin-bottom:12px}
.guide-label{font-size:10px;font-weight:900;color:var(--coral);margin-bottom:4px;letter-spacing:1px}
.guide-text{font-size:12px;line-height:1.7;color:var(--text);word-break:keep-all}
.guide-example{background:linear-gradient(135deg,rgba(255,181,167,0.08),rgba(184,232,208,0.08));border-radius:12px;padding:12px;margin-top:8px;border-left:3px solid var(--peach)}
.guide-example-label{font-size:10px;font-weight:900;color:var(--coral);margin-bottom:4px}
.guide-example-text{font-size:11px;line-height:1.7;color:var(--text);word-break:keep-all}
.card-close-btn{display:block;width:100%;padding:10px;border:none;border-radius:12px;background:rgba(0,0,0,0.04);color:var(--text-light);font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;text-align:center}
/* RESUME BUTTON */
.resume-btn{width:100%;max-width:380px;padding:18px;border:none;border-radius:20px;
  background:linear-gradient(135deg,var(--mint),var(--sky));color:#2D6A4F;font-family:'Black Han Sans';font-size:16px;
  cursor:pointer;box-shadow:0 4px 20px rgba(184,232,208,0.4);transition:transform 0.2s;margin-top:8px}
.resume-btn:active{transform:scale(0.97)}
/* RESUME SCREEN */

.resume-header{text-align:center;margin-bottom:8px}
.resume-header h2{font-family:'Black Han Sans';font-size:20px;color:var(--text)}
.resume-header p{font-size:12px;color:var(--text-light);margin-top:4px}
.resume-section{width:100%;max-width:380px;background:var(--white);border-radius:20px;padding:24px 20px;box-shadow:var(--shadow)}
.resume-section-title{font-family:'Black Han Sans';font-size:15px;color:var(--coral);margin-bottom:4px}
.resume-section-subtitle{font-size:13px;color:var(--text);font-weight:700;margin-bottom:12px;line-height:1.5;
  padding:10px 14px;border-radius:12px;background:linear-gradient(135deg,rgba(255,181,167,0.1),rgba(184,232,208,0.1))}
.resume-prompt{font-size:11px;color:var(--text-light);margin-bottom:8px}
.resume-textarea{width:100%;min-height:100px;border:2px solid rgba(0,0,0,0.08);border-radius:14px;padding:14px;
  font-size:13px;font-family:'Noto Sans KR';line-height:1.7;color:var(--text);resize:vertical;
  outline:none;transition:border-color 0.3s}
.resume-textarea:focus{border-color:var(--peach)}
.resume-textarea::placeholder{color:var(--text-light);font-size:12px}
.resume-lock-msg{display:none;margin-top:8px;padding:14px;border-radius:14px;text-align:center;
  background:linear-gradient(135deg,rgba(255,181,167,0.1),rgba(184,232,208,0.1));
  font-size:12px;color:var(--text);line-height:1.6}
.resume-lock-msg.show{display:block}
.resume-cta{width:100%;max-width:380px;background:linear-gradient(135deg,var(--peach),var(--coral));
  border-radius:20px;padding:24px;text-align:center;color:#fff}
.resume-cta h3{font-family:'Black Han Sans';font-size:16px;margin-bottom:8px}
.resume-cta p{font-size:12px;line-height:1.6;opacity:0.9}
.resume-share-btn{margin-top:12px;padding:14px 32px;border:2px solid #fff;border-radius:40px;background:transparent;
  color:#fff;font-family:'Black Han Sans';font-size:14px;cursor:pointer;transition:all 0.2s}
.resume-share-btn:active{background:rgba(255,255,255,0.2);transform:scale(0.96)}
.resume-back-btn{width:100%;max-width:380px;padding:14px;border:2px solid rgba(0,0,0,0.08);border-radius:16px;
  background:var(--white);color:var(--text-light);font-size:14px;cursor:pointer;text-align:center}
/* LOGO */
.logo-center{display:block;margin:0 auto 12px;height:28px;object-fit:contain}
.logo-right{position:absolute;top:16px;right:16px;height:22px;object-fit:contain;z-index:10}
/* SURVEY */
.survey-section{width:100%;max-width:380px;background:var(--white);border-radius:24px;padding:28px 22px;
  box-shadow:var(--shadow);text-align:center;margin-top:8px}
.survey-title{font-family:'Black Han Sans';font-size:18px;color:var(--text);margin-bottom:4px}
.survey-sub{font-size:12px;color:var(--text-light);margin-bottom:20px}
.survey-item{margin-bottom:20px;text-align:left}
.survey-question{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;line-height:1.5}
.star-rating{display:flex;gap:6px;justify-content:center}
.star-btn{font-size:32px;cursor:pointer;transition:transform 0.15s;background:none;border:none;padding:2px;color:#ddd}
.star-btn.active{color:#F4B942;transform:scale(1.15)}
.star-btn:active{transform:scale(0.9)}
.survey-textarea{width:100%;min-height:60px;border:2px solid rgba(0,0,0,0.08);border-radius:14px;padding:12px;
  font-size:13px;font-family:'Noto Sans KR';line-height:1.6;color:var(--text);resize:none;
  outline:none;transition:border-color 0.3s}
.survey-textarea:focus{border-color:var(--peach)}
.survey-textarea::placeholder{color:var(--text-light);font-size:12px}
.survey-submit{width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--peach),var(--coral));color:#fff;
  font-family:'Black Han Sans';font-size:16px;cursor:pointer;margin-top:16px;transition:transform 0.2s}
.survey-submit:active{transform:scale(0.97)}
.survey-submit:disabled{background:#ccc;cursor:default}
.survey-done{display:none;text-align:center;padding:24px}
.survey-done.show{display:block}
.survey-done-emoji{font-size:48px;margin-bottom:8px}
.survey-done-text{font-family:'Black Han Sans';font-size:16px;color:var(--text);margin-bottom:4px}
.survey-done-sub{font-size:12px;color:var(--text-light)}
/* SHARE ROW */
.share-row{display:flex;gap:12px;width:100%;max-width:380px}
.share-btn{flex:1;padding:15px;border:none;border-radius:16px;font-family:'Black Han Sans';font-size:14px;cursor:pointer;transition:transform 0.2s}
.share-btn:active{transform:scale(0.96)}
.share-save{background:linear-gradient(135deg,var(--mint),var(--sky));color:#2D6A4F}
.share-retry{background:var(--white);color:var(--text);border:2px solid rgba(0,0,0,0.08)}
/* CARD IMAGE for saving */
.save-card{position:fixed;top:-9999px;left:-9999px;width:380px;background:linear-gradient(160deg,#FFF9F0,#FFF0EB);padding:24px;border-radius:28px;z-index:-1;
  border:3px solid rgba(255,181,167,0.5);box-shadow:0 0 0 6px rgba(255,181,167,0.1),0 8px 32px rgba(0,0,0,0.08)}
.save-card .sc-header{text-align:center;margin-bottom:16px}
.save-card .sc-emoji{font-size:48px}
.save-card .sc-title{font-family:'Black Han Sans';font-size:18px;color:var(--text);margin-top:8px}
.save-card .sc-sub{font-size:11px;color:var(--text-light)}
.save-card .sc-equips{display:flex;justify-content:center;gap:8px;margin:12px 0}
.save-card .sc-equip{font-size:24px}
.save-card .sc-badges{display:flex;justify-content:center;gap:6px;margin:12px 0}
.save-card .sc-badge{padding:5px 14px;border-radius:16px;font-size:11px;font-weight:700;
  background:linear-gradient(135deg,rgba(255,181,167,0.3),rgba(168,216,234,0.2));color:#D4574E}
.synergy-box{width:100%;max-width:380px;background:linear-gradient(135deg,rgba(168,216,234,0.15),rgba(213,198,224,0.15));
  border:1.5px solid rgba(168,216,234,0.3);border-radius:20px;padding:20px;text-align:center}
.synergy-title{font-size:12px;color:#3D8DAE;margin-bottom:8px;font-weight:700}
.synergy-emoji{font-size:40px;margin-bottom:4px}
.synergy-name{font-family:'Black Han Sans';font-size:15px;color:var(--text)}
</style>
</head>

'열정':{g:'좋아하는 일에 시간과 에너지를 아끼지 않고 몰입한 경험',s:'장점: "맡은 일에 뜨거운 에너지를 쏟는다" / 보완점: "과열되면 번아웃 위험이 있다"',m:'업무에 대한 열정으로 팀 분위기와 성과를 끌어올리겠다는 방향',ex:'학과 홍보 영상 제작을 맡았을 때, 새벽까지 편집하면서도 수십 번 수정했습니다. 완성된 영상이 학교 공식 채널에서 1만 뷰를 넘겼을 때 큰 보람을 느꼈습니다.'},
'책임감':{g:'맡은 역할을 끝까지 완수한 경험',s:'장점: "한 번 맡으면 끝까지 해낸다" / 보완점: "남의 몫까지 떠안아 과부하가 올 수 있다"',m:'어떤 프로젝트든 끝까지 책임지고 완수하는 인재가 되겠다는 포부',ex:'학과 대표로 학술제를 준비하던 중 두 명이 갑자기 빠졌습니다. "내가 맡았으니 끝까지 한다"는 마음으로 남은 인원과 밤을 새워 성공시켰습니다.'},
'소통능력':{g:'의견 차이를 대화로 풀어낸 경험',s:'장점: "상대의 의도를 정확히 파악하고 전달한다" / 보완점: "모든 의견을 수용하려다 결정이 늦어질 수 있다"',m:'부서 간 소통을 원활하게 하는 가교 역할을 하겠다는 방향',ex:'두 팀원의 방향이 완전히 달라 논쟁이 격해졌을 때, 각자의 의견을 비교표로 만들고 "합치자"고 제안해 양쪽 장점을 결합한 결과물을 만들었습니다.'},
'협동성':{g:'팀의 목표를 위해 개인을 양보하거나 서포트한 경험',s:'장점: "팀의 성공을 내 성공보다 우선한다" / 보완점: "주도적 역할보다 보조 역할에 머물 수 있다"',m:'팀워크를 통해 큰 성과를 만들겠다는 포부',ex:'체육대회 계주에서 가장 빠른 주자였지만, 팀 전략상 2번 주자를 맡았습니다. 개인 기록보다 팀 우승이 중요했기에 기꺼이 역할을 바꿨고, 팀이 우승했습니다.'},
'주인의식':{g:'시키지 않아도 스스로 문제를 발견하고 해결한 경험',s:'장점: "내 일이 아니어도 나서서 해결한다" / 보완점: "경계를 넘어 오지랖으로 비칠 수 있다"',m:'회사의 일을 내 일처럼 생각하고 능동적으로 기여하겠다는 방향',ex:'마트 아르바이트 중 고객 동선이 불편한 것을 발견해, 퇴근 후 매장 배치 개선안을 직접 그려 매니저에게 제안했고, 실제 반영되어 고객 편의가 좋아졌습니다.'},
'진취성':{g:'기회를 기다리지 않고 직접 만들어낸 경험',s:'장점: "기다리기보다 먼저 움직인다" / 보완점: "준비 부족 상태에서 시작할 수 있다"',m:'새로운 기회를 스스로 발굴하고 조직에 제안하겠다는 포부',ex:'학과에 취업 스터디가 없어 직접 SNS에 모집글을 올려 8명을 모았습니다. 매주 모의면접과 자기소개서 피드백을 진행해 참여자 6명이 취업에 성공했습니다.'},
'실천력':{g:'계획을 세우는 데 그치지 않고 즉시 행동으로 옮긴 경험',s:'장점: "생각보다 행동이 빠르다" / 보완점: "충분한 검토 없이 실행할 때가 있다"',m:'기획 단계에서 멈추지 않고 실행까지 책임지는 인재가 되겠다는 방향',ex:'"다이어트 해야지" 말만 하는 친구들 사이에서 그날 바로 러닝화를 신고 뛰었습니다. 3개월간 매일 30분 운동으로 10kg을 감량했고, "일단 시작하면 된다"는 확신을 갖게 되었습니다.'},
'적극성':{g:'소극적인 분위기 속에서 먼저 나서서 분위기를 바꾼 경험',s:'장점: "어떤 상황에서든 적극적으로 참여한다" / 보완점: "과하면 부담을 줄 수 있다"',m:'조직에 활력을 불어넣고 능동적으로 업무에 임하겠다는 포부',ex:'취업박람회에서 다른 참가자들이 망설이는 동안, 관심 기업 부스 5곳을 돌며 직접 명함을 받고 질문했습니다. 한 기업 담당자가 적극성을 보고 인턴 기회를 안내해 주셨습니다.'},
'건전한사고':{g:'힘든 상황에서도 긍정적 시각을 유지해 돌파한 경험',s:'장점: "어려운 상황에서도 감정에 휘둘리지 않는다" / 보완점: "위기감이 부족해 보일 수 있다"',m:'어려운 시기에도 균형 잡힌 판단으로 팀을 안정시키겠다는 방향',ex:'공모전에서 예선 탈락했을 때, "지금 좌절할 시간에 다음을 준비하자"며 탈락 원인을 분석했습니다. 다음 공모전에서 그 분석이 빛을 발해 입상했습니다.'},
'독창성':{g:'남들과 다른 나만의 방식으로 결과를 만든 경험',s:'장점: "나만의 독특한 관점을 가지고 있다" / 보완점: "팀 기준과 다를 때 조율이 필요하다"',m:'차별화된 관점으로 경쟁력 있는 아이디어를 제안하겠다는 포부',ex:'학과 홍보물을 만들 때, 텍스트 리플릿 대신 "학과 하루 브이로그" 숏폼 영상을 제안했습니다. 재학생이 직접 출연한 콘텐츠가 큰 호응을 얻어 학과 지원률이 상승했습니다.'},
'신뢰성':{g:'꾸준한 행동으로 주변의 신뢰를 쌓은 경험',s:'장점: "말과 행동이 일치해 사람들이 믿고 맡긴다" / 보완점: "신뢰를 져버리는 것에 대한 부담이 클 수 있다"',m:'동료와 고객 모두에게 신뢰를 주는 직원이 되겠다는 방향',ex:'동아리 총무로 매달 정확한 수입·지출 내역을 투명하게 공유했습니다. 1년간 단 한 번의 오차도 없이 관리한 결과, "너라면 믿을 수 있다"며 회장 추천을 받았습니다.'},
'도덕성':{g:'이익보다 옳고 그름을 먼저 생각해 행동한 경험',s:'장점: "윤리적 기준이 분명하다" / 보완점: "현실적 타협이 필요한 순간에 갈등할 수 있다"',m:'기업 윤리와 사회적 책임을 실천하는 조직인이 되겠다는 포부',ex:'중고거래 시 작은 흠집이 사진에 잘 보이지 않았지만, 솔직하게 추가 사진을 올린 뒤 판매했습니다. 구매자가 "정직하셔서 감사합니다"라는 후기를 남겨주셨습니다.'},
'인내심':{g:'즉각적인 결과가 없어도 묵묵히 버텨 결국 성과를 낸 경험',s:'장점: "단기 성과에 흔들리지 않고 장기 목표를 향해 간다" / 보완점: "참다가 한꺼번에 터질 수 있다"',m:'장기적 관점에서 꾸준히 성장하며 조직에 기여하겠다는 방향',ex:'운전면허 시험에서 3번 떨어졌지만, 매번 원인을 분석하고 약점을 집중 연습해 4번째에 합격했습니다. 포기하지 않는 것의 힘을 몸소 느꼈습니다.'},
'자율성':{g:'지시 없이 스스로 판단하고 행동해 성과를 낸 경험',s:'장점: "스스로 동기 부여하고 일한다" / 보완점: "팀 방향과 다르게 갈 수 있다"',m:'자율적으로 업무를 관리하며 효율적인 성과를 내겠다는 포부',ex:'인턴 중 상사가 출장으로 3일간 비운 동안, 밀린 데이터 정리와 보고서 초안을 스스로 진행했습니다. "시키지 않아도 알아서 하는 사람"이라며 정규직 추천을 받았습니다.'},
'열린사고':{g:'낯선 의견이나 문화를 수용해 시야가 넓어진 경험',s:'장점: "다른 관점을 거부하지 않고 수용한다" / 보완점: "자기 입장이 불분명해 보일 수 있다"',m:'다양한 의견을 종합해 최선의 결론을 이끌어내는 인재가 되겠다는 방향',ex:'토론 수업에서 정반대 팀에 배정되었지만, 상대 논거를 정리하다 보니 놓쳤던 관점을 발견했습니다. 양쪽 장점을 결합한 리포트로 최고 점수를 받았습니다.'},
'개척정신':{g:'아무도 안 해본 일을 처음으로 시도한 경험',s:'장점: "정해진 길 대신 새로운 길을 만든다" / 보완점: "검증되지 않은 방향이라 실패 리스크가 있다"',m:'신규 사업이나 미개척 시장에서 선도적 역할을 하겠다는 포부',ex:'학과에 졸업생 네트워크가 없어서, 직접 SNS로 선배들을 찾아 "멘토링 프로그램"을 처음 만들었습니다. 첫 해 12쌍이 매칭되었고, 지금도 학과 전통으로 이어지고 있습니다.'},
'사명감':{g:'"이 일이 가치 있다"는 믿음으로 임한 경험',s:'장점: "일의 의미를 찾아 강한 동기로 삼는다" / 보완점: "의미를 못 느끼는 업무에는 동기가 떨어질 수 있다"',m:'회사의 미션에 공감하며 사명감을 가지고 일하겠다는 방향',ex:'독거노인 도시락 배달 봉사를 하며 어르신들이 "네가 올 때가 제일 기다려진다"고 하셨습니다. 이 일이 진짜 필요한 일이라는 사명감으로 1년간 매주 참여했습니다.'},
},
dolphin:{
'추진력':{g:'목표를 정하면 끝까지 밀어붙여 달성한 경험',s:'장점: "실행력이 강하다" / 보완점: "때로 급하게 추진해 디테일을 놓칠 수 있다"',m:'입사 후 맡은 프로젝트를 빠르게 추진하고 성과를 내겠다는 실행 중심 포부',ex:'축제 준비가 더디게 진행될 때, "오늘 카페에서 같이 하자!"고 분위기를 띄웠습니다. 간식을 나눠주며 자연스럽게 역할을 분담하고, 매일 재미있는 밈과 함께 진행 상황을 공유해 팀 전체가 즐겁게 목표를 달성했습니다.'},
'성실성':{g:'매일 꾸준히 반복한 습관이 큰 결과로 이어진 경험',s:'장점: "약속한 것은 반드시 지킨다" / 보완점: "융통성이 부족할 수 있다"',m:'맡은 업무를 흔들림 없이 완수하는 신뢰감 있는 직원이 되겠다는 방향',ex:'영어 회화 스터디를 직접 만들어 6개월간 운영했습니다. 멤버들이 지칠 때마다 재미있는 주제를 기획하고 출석 스티커 보드를 만들어 동기를 유지시켜 8명 전원이 완주했습니다.'},
'창의성':{g:'기존 방식에 의문을 품고 새로운 방법을 시도한 경험',s:'장점: "문제를 다른 각도에서 바라본다" / 보완점: "현실적 제약을 간과할 때가 있다"',m:'고정된 업무 방식을 개선하고 새로운 아이디어를 제안하겠다는 포부',ex:'신입생 모집이 저조하자, 전단지 대신 "동아리 하루 체험 이벤트"를 기획했습니다. 학생들에게 말을 걸어 참여를 유도하고 즉석 사진을 찍어 SNS에 올렸더니, 당일에만 15명이 가입했습니다.'},
'배려심':{g:'타인의 어려움을 먼저 알아차리고 도운 경험',s:'장점: "상대방의 입장을 먼저 생각한다" / 보완점: "자기 주장이 약해질 수 있다"',m:'고객과 동료의 니즈를 섬세하게 파악하는 직원이 되겠다는 방향',ex:'발표 공포증이 있는 팀원에게 강요 대신 "대본을 같이 연습하자"며 매일 15분씩 리허설을 했습니다. 발표 당일 무사히 마친 뒤 "네 덕분이야"라는 말에 정말 뿌듯했습니다.'},
'전문성':{g:'한 분야를 깊이 파고들어 전문 지식을 쌓은 경험',s:'장점: "모르는 것은 끝까지 파헤친다" / 보완점: "완벽주의로 속도가 느려질 수 있다"',m:'해당 직무의 전문가로 성장하겠다는 구체적 로드맵 제시',ex:'마케팅 트렌드를 유튜브, 팟캐스트, 온라인 강의로 공부하며 친구들에게 쉽게 설명해주는 "마케팅 톡" 시간을 만들었습니다. 이 과정에서 이해가 깊어져 공모전에서 수상했습니다.'},
'도전정신':{g:'실패 가능성을 알면서도 과감히 도전한 경험',s:'장점: "두려움보다 호기심이 앞선다" / 보완점: "리스크 관리가 부족할 때가 있다"',m:'새로운 프로젝트에 적극적으로 뛰어들겠다는 도전적 포부',ex:'한 번도 해본 적 없는 버스킹에 도전했습니다. "분위기는 자신 있다"며 친구들을 설득해 팀을 꾸렸고, 관객들과 함께 노래를 부르며 축제에서 가장 뜨거운 무대를 만들었습니다.'},
'의사결정력':{g:'복잡한 상황에서 빠르게 판단해 좋은 결과를 이끈 경험',s:'장점: "핵심을 파악하고 빠르게 결정한다" / 보완점: "충분한 논의 없이 결정할 때가 있다"',m:'현장에서 즉각적인 판단이 필요한 업무에 강점을 발휘하겠다는 포부',ex:'야외 행사 당일 비가 내렸을 때, "실내 카페로 옮기자!"고 바로 제안하고 근처 카페에 단체석을 확보한 뒤 단톡방에 공유했습니다. 오히려 더 아늑한 시간을 보냈습니다.'},
'자신감':{g:'자기 확신을 바탕으로 당당하게 나서서 성과를 낸 경험',s:'장점: "어떤 자리에서든 위축되지 않는다" / 보완점: "자신감이 과하면 독단적으로 보일 수 있다"',m:'고객이나 파트너 앞에서 회사를 대표할 수 있는 인재가 되겠다는 방향',ex:'학과 대표로 산학 협력 미팅에 참석해, 밝은 에너지로 프레젠테이션을 진행했습니다. 담당자분이 "학생이 이렇게 열정적이니 협력하고 싶다"며 MOU를 체결해 주셨습니다.'},
'모험심':{g:'익숙한 환경을 벗어나 새로운 경험을 선택한 이야기',s:'장점: "새로운 환경에 빠르게 적응한다" / 보완점: "한 곳에 오래 집중하기 어려울 수 있다"',m:'변화가 빠른 업계에서 유연하게 대응하겠다는 포부',ex:'방학 동안 제주도 게스트하우스에서 한 달간 지냈습니다. 매일 새로운 사람들과 대화하며 각기 다른 인생 이야기를 들었고, 그 경험이 진로 고민을 풀어주는 열쇠가 되었습니다.'},
'원칙성':{g:'유혹이나 편법 앞에서 원칙을 지킨 경험',s:'장점: "기준이 명확하고 흔들리지 않는다" / 보완점: "유연한 대처가 필요한 상황에서 딱딱해 보일 수 있다"',m:'규정 준수와 공정한 업무 처리로 조직의 신뢰를 쌓겠다는 방향',ex:'동아리 회비를 선배가 개인적으로 쓰자고 했을 때, "선배, 이건 회비라 안 돼요~ 대신 제가 커피 살게요!"라고 부드럽게 거절했습니다. 원칙과 관계를 동시에 지켰습니다.'},
'정직성':{g:'불리한 상황에서도 솔직하게 말해서 신뢰를 얻은 경험',s:'장점: "거짓 없이 솔직하게 소통한다" / 보완점: "직설적이어서 상대가 부담을 느낄 수 있다"',m:'투명한 소통으로 팀과 고객의 신뢰를 구축하겠다는 포부',ex:'카페에서 음료를 잘못 만든 적이 있습니다. "죄송해요, 제가 실수했어요! 바로 다시 만들어 드릴게요~"라고 밝게 사과했더니 그 고객이 단골이 되어 좋은 후기를 남겨주셨습니다.'},
'열정':{g:'좋아하는 일에 시간과 에너지를 아끼지 않고 몰입한 경험',s:'장점: "맡은 일에 뜨거운 에너지를 쏟는다" / 보완점: "과열되면 번아웃 위험이 있다"',m:'업무에 대한 열정으로 팀 분위기와 성과를 끌어올리겠다는 방향',ex:'봉사동아리 홍보를 위해 봉사 현장의 감동적인 순간들을 모아 3분짜리 영상을 만들었습니다. "이 영상 보고 가입했어요"라는 신입 부원들의 말에 밤새운 보람을 느꼈습니다.'},
'책임감':{g:'맡은 역할을 끝까지 완수한 경험',s:'장점: "한 번 맡으면 끝까지 해낸다" / 보완점: "남의 몫까지 떠안아 과부하가 올 수 있다"',m:'어떤 프로젝트든 끝까지 책임지고 완수하는 인재가 되겠다는 포부',ex:'축제 MC 중 음향 장비가 고장나 무대가 멈췄지만, "내가 맡은 무대니까" 즉흥 관객 참여 게임을 진행하며 수습했습니다. 장비 복구 후 관객들의 박수가 지금도 기억납니다.'},
'소통능력':{g:'의견 차이를 대화로 풀어낸 경험',s:'장점: "상대의 의도를 정확히 파악하고 전달한다" / 보완점: "모든 의견을 수용하려다 결정이 늦어질 수 있다"',m:'부서 간 소통을 원활하게 하는 가교 역할을 하겠다는 방향',ex:'두 팀원이 격하게 대립했을 때, 각각과 따로 커피를 마시며 진짜 의도를 정리해 줬습니다. "둘 다 같은 목표인데 방법이 다른 것뿐"이라고 연결해 주니 바로 합의되었습니다.'},
'협동성':{g:'팀의 목표를 위해 개인을 양보하거나 서포트한 경험',s:'장점: "팀의 성공을 내 성공보다 우선한다" / 보완점: "주도적 역할보다 보조 역할에 머물 수 있다"',m:'팀워크를 통해 큰 성과를 만들겠다는 포부',ex:'공모전 팀에서 하고 싶던 디자인 대신 자료 조사를 맡았습니다. "팀이 잘 되면 다 같이 좋은 거"라는 마음으로 꼼꼼하게 정리했고, "네 자료 덕분에 작업이 수월했다"는 감사를 받았습니다.'},
'주인의식':{g:'시키지 않아도 스스로 문제를 발견하고 해결한 경험',s:'장점: "내 일이 아니어도 나서서 해결한다" / 보완점: "경계를 넘어 오지랖으로 비칠 수 있다"',m:'회사의 일을 내 일처럼 생각하고 능동적으로 기여하겠다는 방향',ex:'식당 아르바이트 중 외국인 관광객이 메뉴를 못 읽는 걸 보고, 퇴근 후 "영어 메뉴판을 만들면 어떨까요?"라고 제안하고 직접 번역했습니다. 이후 외국인 손님이 늘었습니다.'},
'진취성':{g:'기회를 기다리지 않고 직접 만들어낸 경험',s:'장점: "기다리기보다 먼저 움직인다" / 보완점: "준비 부족 상태에서 시작할 수 있다"',m:'새로운 기회를 스스로 발굴하고 조직에 제안하겠다는 포부',ex:'"전공 토크 콘서트"를 직접 기획해 교수님들과 선배들을 섭외하고, SNS로 홍보해 50명 이상이 참석하는 행사를 만들었습니다.'},
'실천력':{g:'계획을 세우는 데 그치지 않고 즉시 행동으로 옮긴 경험',s:'장점: "생각보다 행동이 빠르다" / 보완점: "충분한 검토 없이 실행할 때가 있다"',m:'기획 단계에서 멈추지 않고 실행까지 책임지는 인재가 되겠다는 방향',ex:'"봉사활동 가자"는 이야기만 반복되길래, 그날 바로 봉사 사이트에서 신청을 완료하고 단톡방에 "다 신청해놨다~"라고 올렸습니다. 이후 정기 봉사로 이어졌습니다.'},
'적극성':{g:'소극적인 분위기 속에서 먼저 나서서 분위기를 바꾼 경험',s:'장점: "어떤 상황에서든 적극적으로 참여한다" / 보완점: "과하면 부담을 줄 수 있다"',m:'조직에 활력을 불어넣고 능동적으로 업무에 임하겠다는 포부',ex:'취업설명회 질의응답에서 아무도 손을 들지 않자 밝게 손을 들어 질문했습니다. 제 질문을 시작으로 다른 참가자들도 줄줄이 질문하기 시작했습니다.'},
'건전한사고':{g:'힘든 상황에서도 긍정적 시각을 유지해 돌파한 경험',s:'장점: "어려운 상황에서도 감정에 휘둘리지 않는다" / 보완점: "위기감이 부족해 보일 수 있다"',m:'어려운 시기에도 균형 잡힌 판단으로 팀을 안정시키겠다는 방향',ex:'면접에서 연달아 떨어져 스터디 분위기가 가라앉았을 때, "맞는 곳을 아직 못 만난 거야"라며 면접 경험을 게임처럼 공유하는 시간을 만들었습니다. 그 달 3명이 합격했습니다.'},
'독창성':{g:'남들과 다른 나만의 방식으로 결과를 만든 경험',s:'장점: "나만의 독특한 관점을 가지고 있다" / 보완점: "팀 기준과 다를 때 조율이 필요하다"',m:'차별화된 관점으로 경쟁력 있는 아이디어를 제안하겠다는 포부',ex:'학과 홍보 부스에서 리플릿 대신 "1분 토크쇼" 이벤트를 만들어 지나가는 학생들에게 마이크를 건넸습니다. 영상을 찍어 SNS에 올렸더니 조회수가 평소의 10배를 넘겼습니다.'},
'신뢰성':{g:'꾸준한 행동으로 주변의 신뢰를 쌓은 경험',s:'장점: "말과 행동이 일치해 사람들이 믿고 맡긴다" / 보완점: "신뢰를 져버리는 것에 대한 부담이 클 수 있다"',m:'동료와 고객 모두에게 신뢰를 주는 직원이 되겠다는 방향',ex:'모임을 맡으면 장소, 시간, 예약까지 빈틈없이 준비하고 항상 10분 전에 도착했습니다. 인턴에서도 "시키면 걱정 없는 사람"이라는 평가로 이어졌습니다.'},
'도덕성':{g:'이익보다 옳고 그름을 먼저 생각해 행동한 경험',s:'장점: "윤리적 기준이 분명하다" / 보완점: "현실적 타협이 필요한 순간에 갈등할 수 있다"',m:'기업 윤리와 사회적 책임을 실천하는 조직인이 되겠다는 포부',ex:'단체 관람 예매에서 졸업한 친구에게도 학생 할인을 적용하자는 의견이 있었지만, "그 한 명은 일반으로 결제하자"고 밝게 제안했습니다. 작은 양심을 지키니 마음이 편했습니다.'},
'인내심':{g:'즉각적인 결과가 없어도 묵묵히 버텨 결국 성과를 낸 경험',s:'장점: "단기 성과에 흔들리지 않고 장기 목표를 향해 간다" / 보완점: "참다가 한꺼번에 터질 수 있다"',m:'장기적 관점에서 꾸준히 성장하며 조직에 기여하겠다는 방향',ex:'밴드 동아리에서 베이스를 시작했는데 3개월간 실력이 늘지 않았습니다. "무대에서 함께 연주하는 순간을 상상하자"며 매일 30분씩 연습해 6개월 뒤 첫 합주에서 완벽하게 맞아떨어졌습니다.'},
'자율성':{g:'지시 없이 스스로 판단하고 행동해 성과를 낸 경험',s:'장점: "스스로 동기 부여하고 일한다" / 보완점: "팀 방향과 다르게 갈 수 있다"',m:'자율적으로 업무를 관리하며 효율적인 성과를 내겠다는 포부',ex:'인턴 중 팀장님이 "편하게 있어"라고 하셨지만, 고객 응대 매뉴얼을 스스로 읽고 개선 아이디어를 정리해 제안했더니 실제 매뉴얼에 반영되었습니다.'},
'열린사고':{g:'낯선 의견이나 문화를 수용해 시야가 넓어진 경험',s:'장점: "다른 관점을 거부하지 않고 수용한다" / 보완점: "자기 입장이 불분명해 보일 수 있다"',m:'다양한 의견을 종합해 최선의 결론을 이끌어내는 인재가 되겠다는 방향',ex:'교환학생 프로그램에서 문화 차이로 의견이 충돌했지만, "다르다는 건 틀린 게 아니잖아"라며 각자의 방식을 존중하자고 제안했습니다. "가장 글로벌한 시각"이라는 평가를 받았습니다.'},
'개척정신':{g:'아무도 안 해본 일을 처음으로 시도한 경험',s:'장점: "정해진 길 대신 새로운 길을 만든다" / 보완점: "검증되지 않은 방향이라 실패 리스크가 있다"',m:'신규 사업이나 미개척 시장에서 선도적 역할을 하겠다는 포부',ex:'학생들끼리 정보를 나눌 커뮤니티가 없어 "캠퍼스 꿀팁방" 오픈채팅방을 만들었습니다. 500명 이상이 참여하는 채널로 성장해 학교 측에서 공식 채널로 인정해 주었습니다.'},
'사명감':{g:'"이 일이 가치 있다"는 믿음으로 임한 경험',s:'장점: "일의 의미를 찾아 강한 동기로 삼는다" / 보완점: "의미를 못 느끼는 업무에는 동기가 떨어질 수 있다"',m:'회사의 미션에 공감하며 사명감을 가지고 일하겠다는 방향',ex:'지역아동센터에서 영어를 가르치며 아이들이 자신감을 갖기 시작하자 "내가 진짜 필요한 사람이구나"라는 사명감이 생겼습니다. 1년간 매주 빠지지 않았고, 수료식 편지가 보물 1호입니다.'},
},
owl:{
'추진력':{g:'목표를 정하면 끝까지 밀어붙여 달성한 경험',s:'장점: "실행력이 강하다" / 보완점: "때로 급하게 추진해 디테일을 놓칠 수 있다"',m:'입사 후 맡은 프로젝트를 빠르게 추진하고 성과를 내겠다는 실행 중심 포부',ex:'공모전 마감 2주 전, 진행률을 수치로 분석하고 남은 작업을 일 단위로 쪼개는 로드맵을 만들었습니다. 매일 병목 구간을 파악해 해결한 결과 마감 하루 전에 여유롭게 제출했습니다.'},
'성실성':{g:'매일 꾸준히 반복한 습관이 큰 결과로 이어진 경험',s:'장점: "약속한 것은 반드시 지킨다" / 보완점: "융통성이 부족할 수 있다"',m:'맡은 업무를 흔들림 없이 완수하는 신뢰감 있는 직원이 되겠다는 방향',ex:'자격증 시험 준비 시 매일 공부 시간과 진도를 엑셀 시트에 기록했습니다. 하루라도 벗어나면 주말에 보충하는 시스템을 3개월간 운영해 모든 범위를 정확히 2회 반복, 한 번에 합격했습니다.'},
'창의성':{g:'기존 방식에 의문을 품고 새로운 방법을 시도한 경험',s:'장점: "문제를 다른 각도에서 바라본다" / 보완점: "현실적 제약을 간과할 때가 있다"',m:'고정된 업무 방식을 개선하고 새로운 아이디어를 제안하겠다는 포부',ex:'통계 수업 과제에서 단순 보고서 대신 데이터를 인포그래픽으로 시각화했습니다. 교수님이 "데이터를 보는 눈이 다르다"며 수업 예시 자료로 사용하셨습니다.'},
'배려심':{g:'타인의 어려움을 먼저 알아차리고 도운 경험',s:'장점: "상대방의 입장을 먼저 생각한다" / 보완점: "자기 주장이 약해질 수 있다"',m:'고객과 동료의 니즈를 섬세하게 파악하는 직원이 되겠다는 방향',ex:'스터디 모임에서 이해 속도가 느린 멤버를 관찰하고, 모임 후 핵심 요약본을 만들어 보내주었습니다. "네 노트가 교과서보다 이해가 잘 된다"는 말을 들었습니다.'},
'전문성':{g:'한 분야를 깊이 파고들어 전문 지식을 쌓은 경험',s:'장점: "모르는 것은 끝까지 파헤친다" / 보완점: "완벽주의로 속도가 느려질 수 있다"',m:'해당 직무의 전문가로 성장하겠다는 구체적 로드맵 제시',ex:'데이터 분석에 관심이 생겨 관련 논문 20편을 읽고 핵심 방법론을 정리한 개인 위키를 만들었습니다. 프로젝트에서 팀원들이 막힐 때마다 해결사 역할을 할 수 있었습니다.'},
'도전정신':{g:'실패 가능성을 알면서도 과감히 도전한 경험',s:'장점: "두려움보다 호기심이 앞선다" / 보완점: "리스크 관리가 부족할 때가 있다"',m:'새로운 프로젝트에 적극적으로 뛰어들겠다는 도전적 포부',ex:'비전공자였지만 AI 해커톤에 참가해, 대회 전 2주간 관련 기술을 독학하고 3가지 전략을 정리해 갔습니다. 전공자 팀원에게 제안한 전략이 채택되어 장려상을 수상했습니다.'},
'의사결정력':{g:'복잡한 상황에서 빠르게 판단해 좋은 결과를 이끈 경험',s:'장점: "핵심을 파악하고 빠르게 결정한다" / 보완점: "충분한 논의 없이 결정할 때가 있다"',m:'현장에서 즉각적인 판단이 필요한 업무에 강점을 발휘하겠다는 포부',ex:'발표 방향을 놓고 3개 의견이 나왔을 때, 각 방안의 장단점을 표로 정리해 공유하고 "데이터 기준으로 B안이 가장 현실적"이라고 근거를 제시해 5분 만에 결정을 이끌었습니다.'},
'자신감':{g:'자기 확신을 바탕으로 당당하게 나서서 성과를 낸 경험',s:'장점: "어떤 자리에서든 위축되지 않는다" / 보완점: "자신감이 과하면 독단적으로 보일 수 있다"',m:'고객이나 파트너 앞에서 회사를 대표할 수 있는 인재가 되겠다는 방향',ex:'졸업 논문 심사에서 날카로운 질문을 받았지만, "이 주제를 가장 깊이 연구한 사람은 나"라는 확신으로 데이터를 근거로 차분하게 답변해 최우수 논문으로 선정되었습니다.'},
'모험심':{g:'익숙한 환경을 벗어나 새로운 경험을 선택한 이야기',s:'장점: "새로운 환경에 빠르게 적응한다" / 보완점: "한 곳에 오래 집중하기 어려울 수 있다"',m:'변화가 빠른 업계에서 유연하게 대응하겠다는 포부',ex:'전공과 전혀 다른 철학 수업을 교양으로 신청했습니다. 수업에서 배운 논리적 사고 체계가 전공 리포트의 논증 구조를 짜는 데 큰 도움이 되어, 다른 분야 탐색이 본업의 질을 높여줬습니다.'},
'원칙성':{g:'유혹이나 편법 앞에서 원칙을 지킨 경험',s:'장점: "기준이 명확하고 흔들리지 않는다" / 보완점: "유연한 대처가 필요한 상황에서 딱딱해 보일 수 있다"',m:'규정 준수와 공정한 업무 처리로 조직의 신뢰를 쌓겠다는 방향',ex:'선배가 공유한 "족보"를 확인해보니 표절 의심 자료였습니다. "근거가 불분명하니 쓰지 않겠다"고 판단하고 교재 중심으로 공부해 오히려 더 높은 점수를 받았습니다.'},
'정직성':{g:'불리한 상황에서도 솔직하게 말해서 신뢰를 얻은 경험',s:'장점: "거짓 없이 솔직하게 소통한다" / 보완점: "직설적이어서 상대가 부담을 느낄 수 있다"',m:'투명한 소통으로 팀과 고객의 신뢰를 구축하겠다는 포부',ex:'인턴 중 보고서 데이터 해석 오류를 제출 후 발견했지만, 정확한 데이터가 중요하다고 판단해 바로 보고하고 수정본을 제출했습니다. "정직한 사람이 가장 믿음직하다"는 말씀을 들었습니다.'},
'열정':{g:'좋아하는 일에 시간과 에너지를 아끼지 않고 몰입한 경험',s:'장점: "맡은 일에 뜨거운 에너지를 쏟는다" / 보완점: "과열되면 번아웃 위험이 있다"',m:'업무에 대한 열정으로 팀 분위기와 성과를 끌어올리겠다는 방향',ex:'산업 보고서를 매주 1편씩 분석해 블로그에 정리하는 것이 취미가 되었습니다. 면접에서 "이 분야 보고서 분석이 취미입니다"라고 말했을 때 면접관이 깊은 인상을 받으셨습니다.'},
'책임감':{g:'맡은 역할을 끝까지 완수한 경험',s:'장점: "한 번 맡으면 끝까지 해낸다" / 보완점: "남의 몫까지 떠안아 과부하가 올 수 있다"',m:'어떤 프로젝트든 끝까지 책임지고 완수하는 인재가 되겠다는 포부',ex:'졸업 프로젝트에서 코딩 파트 난이도가 높아 우회하자는 의견이 나왔지만, "내가 맡은 파트의 품질은 내가 책임진다"며 3일간 추가 학습 끝에 원래 계획대로 구현했습니다.'},
'소통능력':{g:'의견 차이를 대화로 풀어낸 경험',s:'장점: "상대의 의도를 정확히 파악하고 전달한다" / 보완점: "모든 의견을 수용하려다 결정이 늦어질 수 있다"',m:'부서 간 소통을 원활하게 하는 가교 역할을 하겠다는 방향',ex:'교수님과 팀원 사이에서 방향이 어긋나는 걸 감지하고, 교수님의 피드백을 팀원들이 이해하기 쉽게 재구성해 공유했습니다. 양쪽 다 "소통이 잘 된다"고 해주셨습니다.'},
'협동성':{g:'팀의 목표를 위해 개인을 양보하거나 서포트한 경험',s:'장점: "팀의 성공을 내 성공보다 우선한다" / 보완점: "주도적 역할보다 보조 역할에 머물 수 있다"',m:'팀워크를 통해 큰 성과를 만들겠다는 포부',ex:'발표 자료 제작 대신 데이터 교차 검증 작업을 자처했습니다. 화려하진 않지만 팀의 신뢰도를 높이는 작업이었고, "데이터가 탄탄하다"는 칭찬을 받았습니다.'},
'주인의식':{g:'시키지 않아도 스스로 문제를 발견하고 해결한 경험',s:'장점: "내 일이 아니어도 나서서 해결한다" / 보완점: "경계를 넘어 오지랖으로 비칠 수 있다"',m:'회사의 일을 내 일처럼 생각하고 능동적으로 기여하겠다는 방향',ex:'도서관 근로 장학생으로 일하며 학생들이 특정 분류의 책을 자주 못 찾는 패턴을 발견해, 이용 데이터를 분석한 "인기 도서 코너" 배치 변경안을 제안해 반영시켰습니다.'},
'진취성':{g:'기회를 기다리지 않고 직접 만들어낸 경험',s:'장점: "기다리기보다 먼저 움직인다" / 보완점: "준비 부족 상태에서 시작할 수 있다"',m:'새로운 기회를 스스로 발굴하고 조직에 제안하겠다는 포부',ex:'온라인 논문 리딩 클럽을 기획해 관심 있는 대학원생 5명을 모아 매주 토론했습니다. 이 경험이 대학원 면접에서 "이미 연구 역량이 준비된 학생"이라는 평가로 이어졌습니다.'},
'실천력':{g:'계획을 세우는 데 그치지 않고 즉시 행동으로 옮긴 경험',s:'장점: "생각보다 행동이 빠르다" / 보완점: "충분한 검토 없이 실행할 때가 있다"',m:'기획 단계에서 멈추지 않고 실행까지 책임지는 인재가 되겠다는 방향',ex:'교수님이 "실습 기회가 부족하다"고 하신 걸 듣고 그날 저녁 관련 기관 리스트를 조사해 메일을 보냈습니다. 3곳에서 답이 와 학과 최초의 현장 실습 프로그램이 만들어졌습니다.'},
'적극성':{g:'소극적인 분위기 속에서 먼저 나서서 분위기를 바꾼 경험',s:'장점: "어떤 상황에서든 적극적으로 참여한다" / 보완점: "과하면 부담을 줄 수 있다"',m:'조직에 활력을 불어넣고 능동적으로 업무에 임하겠다는 포부',ex:'세미나에서 다른 참석자들이 침묵하는 가운데 구체적인 방법론에 대해 질문했습니다. 발표자가 상세히 답변해 주셨고, 여러 분이 "덕분에 이해가 깊어졌다"고 해주셨습니다.'},
'건전한사고':{g:'힘든 상황에서도 긍정적 시각을 유지해 돌파한 경험',s:'장점: "어려운 상황에서도 감정에 휘둘리지 않는다" / 보완점: "위기감이 부족해 보일 수 있다"',m:'어려운 시기에도 균형 잡힌 판단으로 팀을 안정시키겠다는 방향',ex:'중간 평가에서 혹평을 받아 팀이 충격에 빠졌을 때, 평가 내용을 항목별로 분류하고 "3가지 중 2가지는 데이터만 보충하면 해결된다"고 분석해 팀을 진정시켰습니다.'},
'독창성':{g:'남들과 다른 나만의 방식으로 결과를 만든 경험',s:'장점: "나만의 독특한 관점을 가지고 있다" / 보완점: "팀 기준과 다를 때 조율이 필요하다"',m:'차별화된 관점으로 경쟁력 있는 아이디어를 제안하겠다는 포부',ex:'마케팅 과제에서 설문조사 대신 SNS 댓글 텍스트 분석을 제안했습니다. 소비자 감정을 시각화한 결과물이 "학부 수준을 넘어선 시도"라며 학과 우수사례로 선정되었습니다.'},
'신뢰성':{g:'꾸준한 행동으로 주변의 신뢰를 쌓은 경험',s:'장점: "말과 행동이 일치해 사람들이 믿고 맡긴다" / 보완점: "신뢰를 져버리는 것에 대한 부담이 클 수 있다"',m:'동료와 고객 모두에게 신뢰를 주는 직원이 되겠다는 방향',ex:'제가 만든 요약 자료의 정확도가 높아 매번 교차 확인을 거친 후 공유했고, 졸업 후에도 후배들이 제 자료를 찾을 정도로 "검증된 사람"이라는 평판을 쌓았습니다.'},
'도덕성':{g:'이익보다 옳고 그름을 먼저 생각해 행동한 경험',s:'장점: "윤리적 기준이 분명하다" / 보완점: "현실적 타협이 필요한 순간에 갈등할 수 있다"',m:'기업 윤리와 사회적 책임을 실천하는 조직인이 되겠다는 포부',ex:'팀 보고서에서 인용 자료의 출처가 불분명한 것을 발견해 원문을 추적해 정확한 출처를 밝히고, 불확실한 부분은 과감히 삭제했습니다. 학문적 정직성을 지킨 보고서가 더 높은 평가를 받았습니다.'},
'인내심':{g:'즉각적인 결과가 없어도 묵묵히 버텨 결국 성과를 낸 경험',s:'장점: "단기 성과에 흔들리지 않고 장기 목표를 향해 간다" / 보완점: "참다가 한꺼번에 터질 수 있다"',m:'장기적 관점에서 꾸준히 성장하며 조직에 기여하겠다는 방향',ex:'프로그래밍 독학 중 첫 2개월은 에러만 반복됐지만, 에러 하나하나를 기록하는 "에러 일지"를 만들어 꾸준히 학습해 5개월 뒤 혼자 웹사이트를 만들 수 있게 되었습니다.'},
'자율성':{g:'지시 없이 스스로 판단하고 행동해 성과를 낸 경험',s:'장점: "스스로 동기 부여하고 일한다" / 보완점: "팀 방향과 다르게 갈 수 있다"',m:'자율적으로 업무를 관리하며 효율적인 성과를 내겠다는 포부',ex:'연구실 인턴 중 교수님이 "자유롭게 탐색해 봐"라고만 하셨지만, 연구 주제 후보 5개를 선정해 가능성 분석 제안서를 만들어 갔더니 추천서를 써주셨습니다.'},
'열린사고':{g:'낯선 의견이나 문화를 수용해 시야가 넓어진 경험',s:'장점: "다른 관점을 거부하지 않고 수용한다" / 보완점: "자기 입장이 불분명해 보일 수 있다"',m:'다양한 의견을 종합해 최선의 결론을 이끌어내는 인재가 되겠다는 방향',ex:'학제간 프로젝트에서 예술대 학생과 한 팀이 되어 처음에는 의문이었지만, 그쪽의 시각화 방법론을 배우니 제 데이터 분석 결과를 훨씬 효과적으로 전달할 수 있었습니다.'},
'개척정신':{g:'아무도 안 해본 일을 처음으로 시도한 경험',s:'장점: "정해진 길 대신 새로운 길을 만든다" / 보완점: "검증되지 않은 방향이라 실패 리스크가 있다"',m:'신규 사업이나 미개척 시장에서 선도적 역할을 하겠다는 포부',ex:'학과에 데이터 분석 수업이 없어서 독학한 내용으로 "데이터 분석 입문" 워크숍을 직접 기획해 운영했습니다. 20명이 참가했고 이듬해 학과 정규 프로그램으로 편입되었습니다.'},
'사명감':{g:'"이 일이 가치 있다"는 믿음으로 임한 경험',s:'장점: "일의 의미를 찾아 강한 동기로 삼는다" / 보완점: "의미를 못 느끼는 업무에는 동기가 떨어질 수 있다"',m:'회사의 미션에 공감하며 사명감을 가지고 일하겠다는 방향',ex:'고령자 디지털 교육 봉사에서 단순히 버튼 위치를 알려주는 대신, 원리를 이해시키는 교육 자료를 만들었습니다. 6개월 뒤 어르신들이 혼자서도 예매할 수 있게 되셨을 때 진정한 보람을 느꼈습니다.'},

turtle:{

'성실성':{g:'매일 꾸준히 반복한 습관이 큰 결과로 이어진 경험',s:'장점: "약속한 것은 반드시 지킨다" / 보완점: "융통성이 부족할 수 있다"',m:'맡은 업무를 흔들림 없이 완수하는 신뢰감 있는 직원이 되겠다는 방향',ex:'매일 아침 한자 10개를 외우는 루틴을 1년간 이어갔습니다. 하루에 10개는 적어 보이지만, 1년 뒤 3,650개를 익혀 최상위 급수에 합격했습니다. 하루도 빠지지 않은 꾸준함의 결과였습니다.'},
'창의성':{g:'기존 방식에 의문을 품고 새로운 방법을 시도한 경험',s:'장점: "문제를 다른 각도에서 바라본다" / 보완점: "현실적 제약을 간과할 때가 있다"',m:'고정된 업무 방식을 개선하고 새로운 아이디어를 제안하겠다는 포부',ex:'제과제빵 아르바이트에서 남는 식빵으로 "오늘의 한정 러스크"를 만들어 보자고 조용히 제안했습니다. 직접 레시피를 개발해 한 달 뒤 정식 메뉴로 등록되어 꾸준한 인기를 끌었습니다.'},
'배려심':{g:'타인의 어려움을 먼저 알아차리고 도운 경험',s:'장점: "상대방의 입장을 먼저 생각한다" / 보완점: "자기 주장이 약해질 수 있다"',m:'고객과 동료의 니즈를 섬세하게 파악하는 직원이 되겠다는 방향',ex:'회의 중 의견을 못 내고 조용히 있는 팀원에게 회의 후 "혹시 생각이 있었는데 말하기 어려웠어?"라고 물었더니 좋은 아이디어가 있었습니다. 다음 회의에서 편하게 말할 수 있도록 자리를 만들어 주었습니다.'},
'전문성':{g:'한 분야를 깊이 파고들어 전문 지식을 쌓은 경험',s:'장점: "모르는 것은 끝까지 파헤친다" / 보완점: "완벽주의로 속도가 느려질 수 있다"',m:'해당 직무의 전문가로 성장하겠다는 구체적 로드맵 제시',ex:'목공에 관심이 생겨 매주 주말마다 공방에 다니며 2년간 기술을 쌓았습니다. "빨리 배우는 것보다 제대로 배우자"는 마음으로 기초부터 차근차근 쌓아 직접 설계한 책상을 완성했습니다.'},
'도전정신':{g:'실패 가능성을 알면서도 과감히 도전한 경험',s:'장점: "두려움보다 호기심이 앞선다" / 보완점: "리스크 관리가 부족할 때가 있다"',m:'새로운 프로젝트에 적극적으로 뛰어들겠다는 도전적 포부',ex:'수영을 전혀 할 줄 몰랐지만 철인3종 대회에 도전했습니다. 1년간 수영부터 차근차근 배워 꼴찌로 완주했지만, 물에 발도 못 담그던 제가 결승선을 통과한 순간이 인생 최고의 순간이었습니다.'},
'의사결정력':{g:'복잡한 상황에서 빠르게 판단해 좋은 결과를 이끈 경험',s:'장점: "핵심을 파악하고 빠르게 결정한다" / 보완점: "충분한 논의 없이 결정할 때가 있다"',m:'현장에서 즉각적인 판단이 필요한 업무에 강점을 발휘하겠다는 포부',ex:'캠핑 중 새벽에 텐트가 무너졌을 때, 조용히 상황을 파악한 뒤 "일단 짐부터 차로 옮기고 근처 펜션에 빈 방 있는지 확인하자"고 차분하게 지시해 모두 안전하게 밤을 보냈습니다.'},

'모험심':{g:'익숙한 환경을 벗어나 새로운 경험을 선택한 이야기',s:'장점: "새로운 환경에 빠르게 적응한다" / 보완점: "한 곳에 오래 집중하기 어려울 수 있다"',m:'변화가 빠른 업계에서 유연하게 대응하겠다는 포부',ex:'방학마다 같은 동네 아르바이트만 했었는데, 한 번은 시골 농장 체험 프로그램에 참여했습니다. 한 달 동안 묵묵히 적응한 뒤 일상의 소중함과 새로운 환경에 대한 자신감을 동시에 얻었습니다.'},

'정직성':{g:'불리한 상황에서도 솔직하게 말해서 신뢰를 얻은 경험',s:'장점: "거짓 없이 솔직하게 소통한다" / 보완점: "직설적이어서 상대가 부담을 느낄 수 있다"',m:'투명한 소통으로 팀과 고객의 신뢰를 구축하겠다는 포부',ex:'공장 실습 중 조립한 부품에 미세한 불량을 발견해 바로 반장님께 보고하고 재작업을 요청했습니다. "이런 정직함이 현장에서 가장 중요하다"며 더 중요한 공정을 맡겨 주셨습니다.'},
'열정':{g:'좋아하는 일에 시간과 에너지를 아끼지 않고 몰입한 경험',s:'장점: "맡은 일에 뜨거운 에너지를 쏟는다" / 보완점: "과열되면 번아웃 위험이 있다"',m:'업무에 대한 열정으로 팀 분위기와 성과를 끌어올리겠다는 방향',ex:'가죽공예에 빠져 매주 주말 4시간씩 공방에서 작업했습니다. 같은 바느질을 수천 번 반복한 끝에 직접 만든 지갑을 가족에게 선물했을 때, 조용하지만 꺼지지 않는 열정의 힘을 느꼈습니다.'},
'책임감':{g:'맡은 역할을 끝까지 완수한 경험',s:'장점: "한 번 맡으면 끝까지 해낸다" / 보완점: "남의 몫까지 떠안아 과부하가 올 수 있다"',m:'어떤 프로젝트든 끝까지 책임지고 완수하는 인재가 되겠다는 포부',ex:'학교 텃밭 관리를 맡아 여름 방학에도 매일 물을 주러 갔습니다. 비가 오나 더위가 나나 꾸준히 관리해 가을에 수확한 채소를 학과 친구들과 나눌 수 있었습니다.'},

// ===== FUNCTIONS =====
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function handleUpload(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(ev){G.personaImg=ev.target.result;const prev=document.getElementById('upload-preview');prev.src=ev.target.result;prev.style.display='block';document.getElementById('upload-icon').style.display='none';document.getElementById('upload-hint').innerHTML='<strong>이미지 등록 완료!</strong>';detectPersona(file)};reader.readAsDataURL(file)}
function detectPersona(file){const name=file.name.toLowerCase();let detected=null;if(name.includes('호랑이')||name.includes('tiger'))detected='tiger';else if(name.includes('돌고래')||name.includes('dolphin'))detected='dolphin';else if(name.includes('부엉이')||name.includes('owl'))detected='owl';else if(name.includes('거북이')||name.includes('turtle'))detected='turtle';const det=document.getElementById('persona-detect');det.classList.add('show');det.innerHTML=`<span style="font-size:13px;color:var(--text);display:block;width:100%;text-align:center;margin-bottom:8px">페르소나를 선택해 주세요</span><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap"><button onclick="confirmPersona('tiger')" class="p-sel-btn" data-p="tiger">🐯 호랑이</button><button onclick="confirmPersona('dolphin')" class="p-sel-btn" data-p="dolphin">🐬 돌고래</button><button onclick="confirmPersona('owl')" class="p-sel-btn" data-p="owl">🦉 부엉이</button><button onclick="confirmPersona('turtle')" class="p-sel-btn" data-p="turtle">🐢 거북이</button></div>`;if(detected)confirmPersona(detected)}
function confirmPersona(p){G.persona=p;document.querySelectorAll('.p-sel-btn').forEach(b=>b.classList.remove('selected'));const btn=document.querySelector(`.p-sel-btn[data-p="${p}"]`);if(btn)btn.classList.add('selected');document.getElementById('go-btn').classList.add('ready')}
function startGame(){if(!G.persona||!G.personaImg){document.getElementById('upload-required').textContent='⚠️ 이미지를 먼저 업로드해 주세요!';return}G.aCount=0;G.bCount=0;G.current=0;G.traits={};G.choices=[];document.getElementById('player-thumb').src=G.personaImg;showScreen('quest-screen');renderQuest()}
function getStage(idx){for(let i=0;i<STAGES.length;i++){if(idx>=STAGES[i].range[0]&&idx<=STAGES[i].range[1])return{...STAGES[i],num:i+1}}return{...STAGES[5],num:6}}
function renderQuest(){const q=QUESTS[G.current];const st=getStage(G.current);document.getElementById('stage-label').textContent=`스테이지 ${st.num}. ${st.name}`;document.getElementById('quest-counter').textContent=`퀘스트 ${G.current+1} / 30`;document.getElementById('progress-fill').style.width=`${(G.current/30)*100}%`;const scenario=q.q.replace(/\n/g,'<br>');document.getElementById('quest-card').innerHTML=`<div class="quest-scenario-box"><div class="quest-num">퀘스트 ${String(G.current+1).padStart(2,'0')}</div><div class="quest-scenario">${scenario}</div></div><div class="vs-container"><div class="vs-card left-card" onclick="choose('A',this)"><div class="vs-skill">${q.aName}</div><div class="vs-desc">${q.aText}</div></div><div class="vs-badge">VS</div><div class="vs-card right-card" onclick="choose('B',this)"><div class="vs-skill">${q.bName}</div><div class="vs-desc">${q.bText}</div></div></div>`;document.getElementById('quest-card').style.animation='none';requestAnimationFrame(()=>{document.getElementById('quest-card').style.animation='cardIn 0.45s ease'})}
function choose(ab,el){const q=QUESTS[G.current];G.choices.push(ab);const cards=document.querySelectorAll('.vs-card');cards.forEach(c=>{if(c===el)c.classList.add('chosen');else c.classList.add('not-chosen')});if(ab==='A'){G.aCount++;addTrait(q.aTrait)}else{G.bCount++;addTrait(q.bTrait)}const justFinished=G.current+1;const isBriefing=justFinished%5===0&&justFinished<=30;setTimeout(()=>{G.current++;if(isBriefing&&G.current<=30)showBriefing(justFinished);else if(G.current>=30)showBriefing(30);else renderQuest()},650)}
function addTrait(t){G.traits[t]=(G.traits[t]||0)+1}
function getStageChoices(si){const st=STAGES[si];let a=0,b=0;for(let i=st.range[0];i<=st.range[1]&&i<G.choices.length;i++){if(G.choices[i]==='A')a++;else b++}return{a,b}}
function getTopTraits(n){return Object.entries(G.traits).sort((a,b)=>b[1]-a[1]).slice(0,n)}
function getAllEquips(){const equips=[];STAGES.forEach((st,i)=>{const sc=getStageChoices(i);const isA=sc.a>=sc.b;equips.push({emoji:isA?st.equipA:st.equipB,name:isA?st.equipAn:st.equipBn})});return equips}

function showBriefing(qNum){const stageIdx=Math.floor((qNum-1)/5);const st=STAGES[stageIdx];const sc=getStageChoices(stageIdx);const isA=sc.a>=sc.b;const equip=isA?st.equipA:st.equipB;const equipName=isA?st.equipAn:st.equipBn;const p=PERSONAS[G.persona];const topTraits=getTopTraits(3);const traitStr=topTraits.map(t=>t[0]).join(', ');const earnedEquips=[];for(let i=0;i<=stageIdx;i++){const sc2=getStageChoices(i);const isA2=sc2.a>=sc2.b;earnedEquips.push(isA2?STAGES[i].equipA:STAGES[i].equipB)}const msgs=[`${p.emoji} ${p.name} 플레이어, 첫 번째 관문을 돌파했어요! 지금까지 강화된 역량은 [${traitStr}]이에요.`,`소통의 미궁을 탈출! [${equipName}]이(가) 장착됩니다. [${traitStr}] 역량이 점점 빛나고 있어요!`,`전문가의 탑 정복! [${equipName}]이(가) 장착됩니다. 걸음마다 힘이 느껴져요!`,`가치관의 계곡을 건넜어요! [${equipName}]이(가) 나타납니다!`,`전설의 무기 [${equipName}] 획득! 최종 각성까지 딱 5 퀘스트!`,`⚡ 최종 각성 완료! 전설의 오라가 온몸을 감쌉니다!`];let orbitHtml='';const positions=['ei-top','ei-right','ei-bottom','ei-left'];earnedEquips.forEach((eq,i)=>{orbitHtml+=`<span class="equip-icon ${positions[i%4]}">${eq}</span>`});const isFinal=G.current>=30;document.getElementById('briefing-box').innerHTML=`<div class="briefing-badge">스테이지 ${stageIdx+1} 클리어! 🎉</div><div class="char-animation"><img class="char-img" src="${G.personaImg}"><div class="equip-orbit">${orbitHtml}</div><span class="sparkle sp1">✨</span><span class="sparkle sp2">⭐</span><span class="sparkle sp3">💫</span><span class="sparkle sp4">🌟</span></div><div class="briefing-equip-name">${equipName} 획득!</div><div class="briefing-equip-slot">${st.slot}</div><div class="briefing-text">🤖 ${msgs[stageIdx]}</div><button class="briefing-dismiss" onclick="dismissBriefing()">${isFinal?'🏆 최종 결과 확인':'다음 스테이지로 →'}</button>`;document.getElementById('briefing-overlay').classList.add('show')}
function dismissBriefing(){document.getElementById('briefing-overlay').classList.remove('show');if(G.current>=30)showResult();else renderQuest()}

function showResult(){document.getElementById('progress-fill').style.width='100%';showScreen('result-screen');const p=PERSONAS[G.persona];const isA=G.aCount>=G.bCount;const setName=isA?p.setA:p.setB;const setDesc=isA?p.setAd:p.setBd;const topTraits=getTopTraits(3);const allTraits=getTopTraits(6);const synergyP=PERSONAS[SYNERGY[G.persona]];const titles={tiger:{a:'승리의 선봉장: 불도저 호랑이',b:'자유로운 폭풍: 야생의 호랑이'},dolphin:{a:'신뢰의 지휘관: 화합의 돌고래',b:'오로라의 예술가: 감성 돌고래'},owl:{a:'절대 진리의 현자: 지혜의 부엉이',b:'미래를 보는 눈: 천재 전략가 부엉이'},turtle:{a:'철혈의 요새: 무적의 거북이',b:'대지의 수호자: 생명의 거북이'}};const finalTitle=titles[G.persona][isA?'a':'b'];const equips=getAllEquips();let invHtml='';equips.forEach((eq,i)=>{invHtml+=`<div class="inv-slot">${eq.emoji}<span class="inv-label">${eq.name}</span></div>`});let feiHtml='';const feiClasses=['fei-1','fei-2','fei-3','fei-4','fei-5','fei-6'];equips.forEach((eq,i)=>{feiHtml+=`<span class="final-equip-icon ${feiClasses[i]}">${eq.emoji}</span>`});const advice=generateCareerAdvice(topTraits,G.persona,isA);

const saveCard=document.getElementById('save-card');saveCard.innerHTML=`<div class="sc-header"><div style="font-size:13px;color:var(--coral);font-weight:900;letter-spacing:1px">🌱 내 습관이 장점이 되다</div><div class="sc-emoji">${p.emoji}</div><div class="sc-title">${finalTitle}</div><div class="sc-sub">${p.name} · ${p.desc}</div></div><div class="sc-equips">${equips.map(eq=>`<span class="sc-equip">${eq.emoji}</span>`).join('')}</div><div class="sc-badges">${topTraits.map(t=>`<span class="sc-badge">#${t[0]}</span>`).join('')}</div>`;

function generateCareerAdvice(topTraits,persona,isA){const names=topTraits.map(t=>t[0]);const p=PERSONAS[persona];const map={'추진력':'목표를 향한 강력한 실행력은 프로젝트 리더, 영업 관리자에게 핵심 역량이에요.','성실성':'꾸준함과 책임감은 공공기관, 금융권에서 높이 평가받는 덕목이에요.','창의성':'기존 틀을 깨는 사고력은 마케팅, 디자인, 콘텐츠 기획에서 빛을 발해요.','배려심':'타인을 살피는 능력은 HR, 상담, 교육 분야에서 큰 강점이 돼요.','전문성':'깊이 있는 지식 추구는 컨설팅, 연구개발, IT 전문가 경로와 잘 어울려요.','도전정신':'두려움 없는 도전은 벤처, 해외사업, 신규사업 개척에 적합해요.','의사결정력':'빠르고 정확한 판단력은 경영기획, 위기관리의 핵심 역량이에요.','원칙성':'흔들리지 않는 원칙은 법무, 감사, 품질관리에서 빛나요.','자신감':'자기 확신은 세일즈, 리더십이 필요한 모든 역할에 강력한 무기예요.','모험심':'새로운 경험을 향한 열정은 스타트업, 크리에이터 경제에 적합해요.'};let adv=`${p.emoji} ${p.name}형 플레이어의 핵심 강점은 [${names.join(', ')}]이에요. `;if(map[names[0]])adv+=map[names[0]]+' ';adv+=isA?'체계적인 환경에서 리더십을 발휘할 때 최고의 성과를 내는 타입이에요!':'변화가 빠른 환경에서 잠재력이 극대화되는 타입이에요!';return adv}

function renderMagicCards(topTraits){const p=G.persona;const pData=GUIDE[p];if(!pData)return '';let html='<div class="magic-cards-section"><div class="wizard-video-wrap"><video autoplay loop muted playsinline src="'+WIZARD_VIDEO+'"></video></div><div class="magic-cards-title">나의 <em>자기소개서 마법카드</em></div>';topTraits.forEach((trait,idx)=>{const tName=trait[0];const data=pData[tName];if(!data)return;const rank=idx===0?'1순위':idx===1?'2순위':'3순위';const emoji=PERSONAS[p].emoji;const cardId=`card-${idx}`;html+=`<div class="magic-card-container"><div class="magic-card" id="${cardId}" onclick="flipCard('${cardId}')"><div class="magic-card-front"><div class="card-rank">★ ${rank} ★</div><div style="font-size:36px;margin:8px 0">${emoji}</div><div class="card-trait-name">${tName}</div><div class="card-tap-hint">터치하면 가이드가 열려요</div></div><div class="magic-card-back"><div class="card-back-header"><div class="card-back-rank">★ ${rank} ★</div><div class="card-back-trait">${emoji} ${tName}</div></div><div class="guide-section"><div class="guide-label">📝 성장 과정 가이드</div><div class="guide-text">${data.g}</div></div><div class="guide-section"><div class="guide-label">💡 성격의 장단점 가이드</div><div class="guide-text">${data.s}</div></div><div class="guide-section"><div class="guide-label">🎯 지원동기/포부 가이드</div><div class="guide-text">${data.m}</div></div><div class="guide-example"><div class="guide-example-label">${emoji} ${PERSONAS[p].name} 예시</div><div class="guide-example-text">${data.ex}</div></div><button class="card-close-btn" onclick="event.stopPropagation();closeCard('${cardId}')">카드 닫기</button></div></div></div>`});html+='</div>';return html}
function flipCard(cardId){const card=document.getElementById(cardId);card.classList.toggle('flipped');const container=card.parentElement;if(card.classList.contains('flipped')){const back=card.querySelector('.magic-card-back');container.style.height=back.scrollHeight+'px';card.style.height=back.scrollHeight+'px'}else{container.style.height='220px';card.style.height='220px'}}
function closeCard(cardId){const card=document.getElementById(cardId);card.classList.remove('flipped');card.parentElement.style.height='220px';card.style.height='220px'}

const surveyData2={star1:0,star2:0};
function initStars2(){document.querySelectorAll('#survey-screen .star-group').forEach(group=>{const g=group.dataset.group;[1,2,3,4,5].forEach(v=>{const btn=document.createElement('button');btn.className='star-btn';btn.textContent='★';btn.dataset.value=v;btn.style.cssText='font-size:28px;background:none;border:none;color:#ddd;cursor:pointer;padding:2px;transition:color 0.15s';btn.onclick=()=>{surveyData2['star'+g]=v;group.querySelectorAll('.star-btn').forEach((b,i)=>{b.style.color=i<v?'#F4B942':'#ddd'})};group.appendChild(btn)})})}

    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      timestamp:new Date().toISOString(),
      satisfaction:surveyData2.star1,
      usefulness:surveyData2.star2,

      persona:G.persona||''
    })

function shareResume(){const p=PERSONAS[G.persona];const topTraits=getTopTraits(3);const traitStr=topTraits.map(t=>`#${t[0]}`).join(' ');const g=document.getElementById('resume-growth')?.value||'(미작성)';const pe=document.getElementById('resume-personality')?.value||'(미작성)';const m=document.getElementById('resume-motivation')?.value||'(미작성)';const t1=topTraits[0]?topTraits[0][0]:'';const rt1=RESUME_TITLES[t1]||{};
const text=`✍️ 나의 자기소개서 초안\n\n${p.emoji} ${p.name} | ${traitStr}\n\n📝 1. 성장 과정\n제목: "${rt1.growth||''}"\n나의 에피소드: ${g}\n\n📝 2. 성격의 장단점\n제목: "${rt1.personality||''}"\n나의 에피소드: ${pe}\n\n📝 3. 지원동기 및 포부\n제목: "${rt1.motivation||''}"\n나의 에피소드: ${m}\n\n→ 고용센터에서 자기소개서 완성하기!`;
if(navigator.share){navigator.share({title:'나의 자기소개서 초안',text}).catch(()=>{})}else{navigator.clipboard.writeText(text).then(()=>{alert('자소서 초안이 복사되었습니다!\n카카오톡에 붙여넣기 해주세요 💬')}).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('자소서 초안이 복사되었습니다!')})}}

function drawRadar(traits){const canvas=document.getElementById('radar-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');const W=260,H=260,cx=W/2,cy=H/2,R=85;canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.scale(2,2);const n=traits.length||1;const maxVal=Math.max(...traits.map(t=>t[1]),5);const step=(Math.PI*2)/n;for(let ring=1;ring<=4;ring++){ctx.beginPath();const r=(R/4)*ring;for(let i=0;i<=n;i++){const a=-Math.PI/2+step*i;const x=cx+r*Math.cos(a);const y=cy+r*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle='rgba(0,0,0,0.06)';ctx.lineWidth=0.5;ctx.stroke()}for(let i=0;i<n;i++){const a=-Math.PI/2+step*i;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.stroke()}ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n;const val=traits[idx][1]/maxVal;const a=-Math.PI/2+step*idx;const x=cx+R*val*Math.cos(a);const y=cy+R*val*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.fillStyle='rgba(255,181,167,0.25)';ctx.fill();ctx.strokeStyle='rgba(255,138,128,0.7)';ctx.lineWidth=2;ctx.stroke();for(let i=0;i<n;i++){const val=traits[i][1]/maxVal;const a=-Math.PI/2+step*i;const x=cx+R*val*Math.cos(a);const y=cy+R*val*Math.sin(a);ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle='#FF8A80';ctx.fill();ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();const lx=cx+(R+22)*Math.cos(a);const ly=cy+(R+22)*Math.sin(a);ctx.fillStyle='#666';ctx.font='500 11px Noto Sans KR';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(traits[i][0],lx,ly)}}

// ===== SURVEY =====
const SURVEY_URL='https://script.google.com/macros/s/AKfycbyGZDGXNdDimXm0sAFYYwV1d0qjx5EmmaG2jvheH3l35EA8l9avYOX9hDxgk2W9FJR4/exec';
const surveyData={star1:0,star2:0};

function setStar(group,value){
  surveyData['star'+group]=value;
  const container=document.getElementById('stars-'+group);
  if(!container)return;
  const buttons=container.querySelectorAll('.star-btn');
  buttons.forEach((btn,i)=>{
    if(i<value)btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

function submitSurvey(){
  const comment=document.getElementById('survey-comment')?.value||'';
  if(surveyData.star1===0||surveyData.star2===0){
    alert('별점을 선택해 주세요! ⭐');
    return;
  }
  const btn=document.getElementById('survey-submit-btn');
  btn.disabled=true;
  btn.textContent='제출 중...';
  
  fetch(SURVEY_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      satisfaction:surveyData.star1,
      usefulness:surveyData.star2,
      comment:comment
    })
  }).then(()=>{
    document.getElementById('survey-form').style.display='none';
    document.getElementById('survey-done').classList.add('show');
  }).catch(()=>{
    document.getElementById('survey-form').style.display='none';
    document.getElementById('survey-done').classList.add('show');
  });
}

function retry(){G.persona=null;G.personaImg=null;G.aCount=0;G.bCount=0;G.current=0;G.traits={};G.choices=[];showScreen('intro-screen')}
